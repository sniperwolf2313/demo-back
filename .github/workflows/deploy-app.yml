name: Manual - Infra + Deploy to Elastic Beanstalk (uses build artifact)

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Opcional: run id del workflow de build, usa el último build exitoso en main."
        required: false
      version_label:
        description: "Opcional: version label en EB, usa el SHA del build."
        required: false

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: manual-infra-deploy-eb
  cancel-in-progress: false

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TFSTATE_BUCKET: demo-backend-tfstate-317196639027
      WORKFLOW_NAME: "CI - Build, Test, Security"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Resolve build run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.build_run_id }}
          REPO: ${{ github.repository }}
          WF_NAME: ${{ env.WORKFLOW_NAME }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_RUN_ID}" ]; then
            echo "run_id=${INPUT_RUN_ID}" >> $GITHUB_OUTPUT
            echo "Using provided run_id=${INPUT_RUN_ID}"
            exit 0
          fi

          echo "Finding latest successful build on main for workflow: ${WF_NAME}"

          WF_ID="$(gh api "/repos/${REPO}/actions/workflows" \
            -H "Accept: application/vnd.github+json" \
            | jq -r --arg name "${WF_NAME}" '.workflows[] | select(.name==$name) | .id' \
            | head -n 1)"

          if [ -z "${WF_ID}" ] || [ "${WF_ID}" = "null" ]; then
            echo "ERROR: Workflow '${WF_NAME}' not found."
            exit 1
          fi

          RUN_ID="$(gh api "/repos/${REPO}/actions/workflows/${WF_ID}/runs?branch=main&status=success&per_page=1" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.workflow_runs[0].id')"

          if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
            echo "ERROR: No successful runs found for workflow '${WF_NAME}' on branch main."
            exit 1
          fi

          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "Resolved run_id=${RUN_ID}"

      - name: Resolve build SHA
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          INPUT_LABEL: ${{ inputs.version_label }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_LABEL}" ]; then
            echo "label=${INPUT_LABEL}" >> $GITHUB_OUTPUT
            exit 0
          fi

          SHA="$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.head_sha')"

          if [ -z "${SHA}" ] || [ "${SHA}" = "null" ]; then
            echo "ERROR: Could not resolve head_sha for run ${RUN_ID}"
            exit 1
          fi

          echo "label=${SHA}" >> $GITHUB_OUTPUT
          echo "Using version label SHA=${SHA}"

      - name: Download app-jar artifact from build run (via API)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          set -euo pipefail
      
          echo "Fetching artifacts for run: ${RUN_ID}"
          ARTIFACT_ID="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            | jq -r '.artifacts[] | select(.name=="app-jar") | .id' \
            | head -n 1)"
      
          if [ -z "${ARTIFACT_ID}" ] || [ "${ARTIFACT_ID}" = "null" ]; then
            echo "ERROR: Artifact 'app-jar' not found in run ${RUN_ID}"
            gh api "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" | jq '.artifacts[] | {name,id,expired,created_at,size_in_bytes}'
            exit 1
          fi
      
          echo "Downloading artifact id=${ARTIFACT_ID}"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > app-jar.zip
      
          mkdir -p artifact
          unzip -o app-jar.zip -d artifact
          ls -la artifact

      - name: Verify jar present
        run: |
          set -euo pipefail
          ls -la artifact
          ls artifact/*.jar >/dev/null

      # 4) Auth AWS
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure tfstate bucket exists
        run: |
          set -euo pipefail
          if aws s3api head-bucket --bucket "${TFSTATE_BUCKET}" 2>/dev/null; then
            echo "tfstate bucket exists: ${TFSTATE_BUCKET}"
          else
            echo "Creating tfstate bucket: ${TFSTATE_BUCKET}"
            aws s3api create-bucket --bucket "${TFSTATE_BUCKET}" --region "${AWS_REGION}"
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TFSTATE_BUCKET}" \
            --versioning-configuration Status=Enabled

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -lock-timeout=2m -out=tfplan

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false -lock-timeout=2m -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf
        working-directory: infra
        run: |
          set -euo pipefail
          terraform output -json > /tmp/tf-outputs.json

          BUCKET="$(jq -r '.versions_bucket.value' /tmp/tf-outputs.json)"
          APP="$(jq -r '.app_name.value' /tmp/tf-outputs.json)"
          ENV="$(jq -r '.env_name.value' /tmp/tf-outputs.json)"

          if [ -z "$BUCKET" ] || [ "$BUCKET" = "null" ]; then
            echo "ERROR: No Terraform outputs found (check outputs.tf + backend state)."
            cat /tmp/tf-outputs.json
            exit 1
          fi

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # 8) Crear ZIP para EB desde el JAR descargado
      - name: Create EB bundle (zip) from artifact
        run: |
          set -euo pipefail
          JAR_PATH="$(ls artifact/*.jar | head -n 1)"

          mkdir -p bundle
          cp "$JAR_PATH" bundle/app.jar

          cat > bundle/Procfile <<'EOF'
          web: java -Dserver.port=5000 -jar app.jar
          EOF

          (cd bundle && zip -r ../deploy.zip .)

      # 9) Subir zip a S3 versions bucket + crear EB version + update env
      - name: Upload bundle to S3
        id: upload
        run: |
          set -euo pipefail
          VERSION_LABEL="${{ steps.sha.outputs.label }}"
          S3_KEY="releases/${VERSION_LABEL}.zip"

          aws s3 cp deploy.zip "s3://${{ steps.tf.outputs.bucket }}/${S3_KEY}"

          echo "version=${VERSION_LABEL}" >> $GITHUB_OUTPUT
          echo "s3_key=${S3_KEY}" >> $GITHUB_OUTPUT

      - name: Create EB application version
        run: |
          set -euo pipefail
          aws elasticbeanstalk create-application-version \
            --application-name "${{ steps.tf.outputs.app }}" \
            --version-label "${{ steps.upload.outputs.version }}" \
            --source-bundle S3Bucket="${{ steps.tf.outputs.bucket }}",S3Key="${{ steps.upload.outputs.s3_key }}" \
            --process

      - name: Update EB environment
        run: |
          set -euo pipefail
          aws elasticbeanstalk update-environment \
            --environment-name "${{ steps.tf.outputs.env }}" \
            --version-label "${{ steps.upload.outputs.version }}"

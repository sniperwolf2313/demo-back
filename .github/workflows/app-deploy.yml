name: Deploy Spring Boot AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TFSTATE_BUCKET: demo-backend-tfstate-317196639027

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build
        run: ./gradlew build -x test

      - name: Package EB app
        run: |
          set -euo pipefail
          JAR=$(ls build/libs/*.jar | head -n 1)
          mkdir -p bundle
          cp "$JAR" bundle/app.jar

          cat <<'EOF' > bundle/Procfile
          web: java -Dserver.port=5000 -jar app.jar
          EOF

          (cd bundle && zip -r ../app.zip .)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tf
        working-directory: infra
        run: |
          set -euo pipefail
          echo "versions_bucket=$(terraform output -raw versions_bucket)" >> $GITHUB_OUTPUT
          echo "app_name=$(terraform output -raw app_name)" >> $GITHUB_OUTPUT
          echo "env_name=$(terraform output -raw env_name)" >> $GITHUB_OUTPUT
          echo "env_url=$(terraform output -raw env_url)" >> $GITHUB_OUTPUT

      - name: Upload app to S3 (versions bucket)
        run: |
          set -euo pipefail
          BUCKET="${{ steps.tf.outputs.versions_bucket }}"
          aws s3 cp app.zip "s3://${BUCKET}/app.zip"

      - name: Create EB application version
        run: |
          set -euo pipefail
          APP="${{ steps.tf.outputs.app_name }}"
          BUCKET="${{ steps.tf.outputs.versions_bucket }}"
          VERSION="v-${{ github.run_number }}-${{ github.sha }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          aws elasticbeanstalk create-application-version \
            --application-name "$APP" \
            --version-label "$VERSION" \
            --source-bundle S3Bucket="$BUCKET",S3Key="app.zip"

      - name: Deploy to EB environment
        run: |
          set -euo pipefail
          ENV="${{ steps.tf.outputs.env_name }}"
          aws elasticbeanstalk update-environment \
            --environment-name "$ENV" \
            --version-label "$VERSION"

      - name: Print environment URL
        run: |
          echo "EB URL: http://${{ steps.tf.outputs.env_url }}"

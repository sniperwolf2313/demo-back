name: Deploy Spring Boot AWS

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TFSTATE_BUCKET: demo-backend-tfstate-317196639027

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build
        run: ./gradlew build -x test

      - name: Package EB app
        run: |
          JAR=$(ls build/libs/*.jar | head -n 1)
          mkdir bundle
          cp $JAR bundle/app.jar

          cat <<EOF > bundle/Procfile
          web: java -Dserver.port=5000 -jar app.jar
          EOF

          cd bundle
          zip -r ../app.zip .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Upload app to S3
        run: |
          aws s3 cp app.zip s3://${{ secrets.EB_VERSIONS_BUCKET }}/app.zip

      - name: Create EB version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APPLICATION_NAME }} \
            --version-label v-${{ github.run_number }} \
            --source-bundle S3Bucket=${{ secrets.EB_VERSIONS_BUCKET }},S3Key=app.zip

      - name: Deploy to EB
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ secrets.EB_ENVIRONMENT_NAME }} \
            --version-label v-${{ github.run_number }}
